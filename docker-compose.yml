services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: veritrabajo-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    networks:
      - veritrabajo-network


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veritrabajo-backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      - SPRING_PROFILES_ACTIVE=dev
    networks:
      - veritrabajo-network


networks:
  veritrabajo-network:
    driver: bridge