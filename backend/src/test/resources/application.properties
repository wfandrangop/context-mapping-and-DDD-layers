spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/veritrabajo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:veritrabajo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:veritrabajo}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
app.storage.upload-dir=${APP_STORAGE_UPLOAD_DIR:uploads}
security.jwt.secret=${SECURITY_JWT_SECRET:change-this-secret-key-at-least-32-bytes}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0.7
